
<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>중등 영어 단어 트레이너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans KR', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            bg: '#0a0a0a',
                            text: '#f5f5f5',
                            muted: '#737373',
                            border: '#262626'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #000 !important; /* 글자가 보이도록 배경은 검은색 */
        }

        /* 모든 텍스트와 선을 흰색으로 강제 */
        * {
            color: #fff !important;
            border-color: #fff !important;
        }

        /* 테마 토글 버튼 숨김 */
        #theme-toggle {
            display: none !important;
        }

        /* Minimalist Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #fff !important; }

        /* Custom Radio Styles for Minimalist UI */
        input[type="radio"]:checked + span {
            font-weight: 700;
            border-bottom: 2px solid #fff !important;
        }

        /* 개별 뜻 가리기 기능 스타일 (애니메이션 제거) */
        .meaning-text {
            border-radius: 4px;
            padding: 2px 4px;
            cursor: pointer;
        }
        /* 숨겨진 상태일 때 */
        .meaning-text.hidden-state {
            color: transparent !important;
            background-color: #fff !important;
        }
        /* 마우스 오버 / 터치 시 일시적으로 뜻 보이기 */
        .meaning-text.hidden-state:hover,
        .meaning-text.hidden-state:active {
            color: #000 !important;
            background-color: #fff !important;
        }
    </style>
</head>
<body class="bg-white text-gray-900 dark:bg-dark-bg dark:text-dark-text min-h-screen flex flex-col antialiased selection:bg-gray-200 dark:selection:bg-gray-800">
    
    <!-- Top Navigation Bar -->
    <header class="px-6 py-6 flex justify-between items-center max-w-4xl mx-auto w-full">
        <div class="text-lg font-bold tracking-tighter">VOCA<span class="font-light text-gray-400">TRAINER</span></div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow w-full max-w-4xl mx-auto px-6 flex flex-col">
        
        <!-- Tab Navigation -->
        <nav class="flex space-x-6 mb-12 text-sm">
            <button onclick="switchView('study')" id="tab-study" class="font-bold border-b-2 pb-1">학습모드</button>
            <button onclick="switchView('list')" id="tab-list" class="font-normal border-b-2 border-transparent pb-1">전체목록</button>
        </nav>

        <!-- ====== Study View ====== -->
        <div id="study-view" class="flex-grow flex flex-col">
            
            <!-- Config & Progress -->
            <div class="flex justify-between items-center mb-8 text-sm">
                <div class="flex space-x-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="quizMode" value="en-ko" checked onchange="resetQuiz()" class="peer sr-only">
                        <span class="pb-1 hover:text-gray-900 dark:hover:text-white">EN ➔ KO</span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="quizMode" value="ko-en" onchange="resetQuiz()" class="peer sr-only">
                        <span class="pb-1 hover:text-gray-900 dark:hover:text-white">KO ➔ EN</span>
                    </label>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="toggleMemorizeCurrent(event)" id="btn-memorize-study" class="flex items-center space-x-1 hover:text-gray-900 dark:hover:text-white" title="외운 단어 표시">
                        <span id="memorize-icon" class="text-lg leading-none">○</span>
                        <span>외움</span>
                    </button>
                    <div class="font-mono tracking-widest" id="progress-text">1 / 110</div>
                </div>
            </div>

            <!-- Text Display Area -->
            <div class="flex-grow flex flex-col items-center justify-center cursor-pointer group" onclick="toggleReveal()">
                <div id="question-text" class="text-4xl sm:text-5xl md:text-6xl font-bold text-center break-words px-4 mb-6 leading-tight tracking-tight">
                    Word
                </div>
                <div id="answer-text" class="text-xl sm:text-2xl md:text-3xl font-medium text-center break-words px-4 opacity-0">
                    Meaning
                </div>
                <div id="reveal-hint" class="mt-12 text-xs tracking-[0.2em] uppercase">
                    Tap to reveal
                </div>
            </div>

            <!-- Navigation Controls -->
            <div class="flex justify-between items-center pt-8 pb-12 border-t mt-auto">
                <button onclick="prevWord()" class="text-sm font-medium hover:text-gray-300 px-4 py-2">PREV</button>
                <button onclick="shuffleWords()" class="text-sm font-bold tracking-widest hover:text-gray-300 px-4 py-2">SHUFFLE</button>
                <button onclick="nextWord()" class="text-sm font-medium hover:text-gray-300 px-4 py-2">NEXT</button>
            </div>
        </div>

        <!-- ====== List View ====== -->
        <div id="list-view" class="hidden flex-col h-full space-y-2 pb-12">
            <!-- 검색바 & 뜻 가리기 버튼 -->
            <div class="flex items-center space-x-4 mb-4 border-b">
                <input type="text" id="search-bar" onkeyup="filterList()" placeholder="검색..." class="flex-grow text-2xl font-light bg-transparent focus:outline-none py-4 placeholder-gray-500">
                <button onclick="toggleAllMeanings()" id="btn-toggle-meanings" class="whitespace-nowrap text-sm font-medium border rounded px-4 py-2 hover:bg-white hover:text-black">
                    전체 뜻 가리기
                </button>
            </div>

            <div class="flex-grow overflow-y-auto pr-2 mt-2">
                <table class="w-full text-left">
                    <tbody id="voca-table-body" class="divide-y divide-gray-700">
                        <!-- Data rows injected here -->
                    </tbody>
                </table>
            </div>
            <div class="flex justify-between items-center mt-4">
                <div class="text-xs font-mono tracking-widest">
                    MEMORIZED: <span id="memorized-count">0</span>
                </div>
                <div class="text-xs font-mono tracking-widest">
                    TOTAL: <span id="total-words-count">0</span>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Data Setup
        const rawData = [
            ["physical appearance", "신체적 외모"], ["tall", "키가 큰"], ["short", "키가 작은, 짧은"], ["thin", "마른, 가느다란"],
            ["slim", "날씬한, 호리호리한"], ["overweight", "과체중의, 비만인"], ["handsome", "잘생긴"], ["pretty", "예쁜"],
            ["wavy hair", "웨이브 머리"], ["straight hair", "생머리"], ["curly hair", "곱슬머리"], ["outgoing", "외향적인, 사교적인"],
            ["shy", "수줍음 타는, 부끄러워하는"], ["quiet", "조용한"], ["talkative", "말하기 좋아하는, 수다스러운"], ["funny", "재미있는, 웃기는"],
            ["serious", "진지한, 심각한"], ["T-shirt", "티셔츠"], ["pants", "바지"], ["shorts", "반바지"], ["skirt", "치마"],
            ["dress", "드레스, 원피스"], ["shoes", "신발"], ["socks", "양말"], ["cap", "모자"], ["How much is it?", "얼마예요?"],
            ["It's too expensive", "너무 비싸요"], ["Can I get a discount?", "할인해 주실 수 있나요?"], ["I'll take it", "그것으로 할게요 (살게요)"],
            ["color", "색깔, 색상"], ["role model", "롤모델, 본보기"], ["respect", "존경하다, 존중하다"], ["curiosity", "호기심"],
            ["kindness", "친절함"], ["patience", "인내심"], ["have in common", "공통점이 있다"], ["creative", "창의적인"],
            ["passionate", "열정적인"], ["brave", "용감한"], ["honest", "정직한"], ["positive", "긍정적인"], ["modest", "겸손한"],
            ["admit one's mistakes", "자신의 실수를 인정하다"], ["give it a try", "한번 해보다, 시도하다"], ["challenge", "도전, 도전하다"],
            ["failure", "실패"], ["never give up", "절대 포기하지 않다"], ["hard work", "노력, 수고"], ["achieve", "달성하다, 성취하다"],
            ["success", "성공"], ["dream", "꿈, 꿈꾸다"], ["make a difference", "변화를 일으키다, 차이를 만들다"], ["encourage", "격려하다, 권장하다"],
            ["support", "지지하다, 후원하다"], ["influence", "영향, 영향을 주다"], ["inspire", "영감을 주다"], ["follow", "따르다, 따라가다"],
            ["advice", "조언, 충고"], ["responsibility", "책임, 책임감"], ["confidence", "자신감, 확신"], ["leadership", "리더십, 지도력"],
            ["cooperation", "협력, 협동"], ["teamwork", "팀워크, 협동 작업"], ["price", "가격"], ["discount", "할인"],
            ["receipt", "영수증"], ["change", "잔돈, 거스름돈"], ["wallet", "지갑"], ["aisle", "통로"], ["section", "구역, 부문"],
            ["department store", "백화점"], ["grocery store", "식료품점"], ["customer", "고객, 손님"], ["clerk", "점원, 직원"],
            ["look for", "~을 찾다"], ["try on", "(옷 등을) 입어보다, 써보다"], ["size", "크기, 치수"], ["credit card", "신용카드"],
            ["cash", "현금"], ["refund", "환불, 환불하다"], ["exchange", "교환, 교환하다"], ["guarantee", "보증, 보장하다"],
            ["legend", "전설"], ["scream", "소리치다"], ["bleed", "피 흘리다"], ["relentless", "수그러들지 않는, 끈질긴"],
            ["survive", "살아남다, 생존하다"], ["fierce", "사나운, 험악한, 극심한, 맹렬한"], ["eternity", "영원, 오랜 시간"],
            ["scar", "상처, 흉터"], ["shimmer", "희미하게 빛나다"], ["splendid", "정말 좋은, 멋진"], ["let", "허락하다, 놓아두다"],
            ["wonder", "궁금해하다, 놀라다"], ["whole", "전체의, 모든"], ["point of view", "관점, 견해"], ["unbelievable", "믿을 수 없는"],
            ["soaring", "날아오르는, 급상승하는"], ["take ~ for granted", "~을 당연하게 여기다"], ["anxious", "불안해하는, 염려하는"],
            ["blame", "~을 탓하다, 탓"], ["sooner or later", "조만간, 곧"], ["question", "의문, 질문, 의심하다"],
            ["blessing", "축복"], ["hope", "바라다, ~하면 좋겠다"], ["do one's best", "최선을 다하다"], ["worried", "걱정되는"],
            ["nervous", "초조해하는, 불안해하는"], ["well prepared", "잘 준비된"], ["take a trip", "여행을 가다"],
            ["presentation", "발표"], ["join", "가입하다, 함께하다"], ["main goal", "주요 목표"], ["be interested in", "~에 관심이 있다"],
            ["steal the show", "관심을 독차지하다, 주인공이 되다"], ["miss out on", "(기회를) 놓치다"], ["moment", "순간, 시기"],
            ["Would you mind if ~?", "~해도 괜찮을까요?"], ["opportunity", "기회"], ["hurt", "상처 입은, 아프다"],
            ["ignore", "무시하다, 못 본 척하다"], ["truth", "사실, 진실"], ["choke", "숨이 막히다, 목을 조르다"],
            ["be obsessed (with)", "~에 집착하다, 사로잡히다"], ["honestly", "솔직히, 정말로"], ["crash", "충돌하다, 추락하다"],
            ["explosion", "폭발, 폭파"], ["ruin", "망치다, 엉망으로 만들다"], ["imagination", "상상력, 상상"],
            ["reach out", "손을 뻗다, 관심을 보이다"], ["trepidation", "두려움, 공포"], ["explain", "설명하다"],
            ["hold on to", "~에 매달리다, 의지하다"], ["take a look", "살펴보다, 한번 보다"], ["spin", "회전하다, 빙빙 돌다"],
            ["create", "창조하다, 창작하다"]
        ];

        let studyWords = []; // 암기 모드 전용 배열 (외운 단어 제외)
        let currentIndex = 0;
        let isRevealed = false;
        
        // 상태 관리 (이전 localStorage 완벽 호환)
        let memorizedWords = new Set(JSON.parse(localStorage.getItem('voca-memorized') || '[]'));
        let hiddenMeanings = new Set();

        // 초기 학습 단어 목록 구성
        function refreshStudyList() {
            const oldWordEn = studyWords[currentIndex] ? studyWords[currentIndex][0] : null;
            
            // 외운 단어를 제외하여 학습 목록 생성
            studyWords = rawData.filter(w => !memorizedWords.has(w[0]));
            
            if (studyWords.length === 0) {
                currentIndex = 0;
                return;
            }

            if (oldWordEn) {
                // 방금 외움 처리한 경우, 해당 위치에 있는 다음 단어를 자연스럽게 보여주기 위해 인덱스 조정
                if (memorizedWords.has(oldWordEn)) {
                    if (currentIndex >= studyWords.length) {
                        currentIndex = 0;
                    }
                } else {
                    const newIdx = studyWords.findIndex(w => w[0] === oldWordEn);
                    if (newIdx !== -1) currentIndex = newIdx;
                }
            } else {
                currentIndex = 0;
            }
        }

        // --- Application Logic ---
        
        function switchView(view) {
            const studyView = document.getElementById('study-view');
            const listView = document.getElementById('list-view');
            const tabStudy = document.getElementById('tab-study');
            const tabList = document.getElementById('tab-list');

            const activeClasses = ['font-bold', 'border-white'];
            const inactiveClasses = ['font-normal', 'border-transparent'];

            if(view === 'study') {
                studyView.classList.remove('hidden');
                studyView.classList.add('flex');
                listView.classList.add('hidden');
                listView.classList.remove('flex');
                
                tabStudy.classList.add(...activeClasses);
                tabStudy.classList.remove(...inactiveClasses);
                tabList.classList.add(...inactiveClasses);
                tabList.classList.remove(...activeClasses);

                refreshStudyList();
                updateCardText();
            } else {
                studyView.classList.add('hidden');
                studyView.classList.remove('flex');
                listView.classList.remove('hidden');
                listView.classList.add('flex');
                
                tabList.classList.add(...activeClasses);
                tabList.classList.remove(...inactiveClasses);
                tabStudy.classList.add(...inactiveClasses);
                tabStudy.classList.remove(...activeClasses);
                
                renderList();
            }
        }

        function toggleMemorizeCurrent(e) {
            e.stopPropagation();
            if (studyWords.length === 0) return;
            const currentWordEn = studyWords[currentIndex][0];
            toggleMemorizedStatus(currentWordEn);
        }

        function toggleMemorizedStatus(wordEn) {
            if (memorizedWords.has(wordEn)) {
                memorizedWords.delete(wordEn);
            } else {
                memorizedWords.add(wordEn);
            }
            localStorage.setItem('voca-memorized', JSON.stringify([...memorizedWords]));
            
            if(!document.getElementById('study-view').classList.contains('hidden')) {
                refreshStudyList();
                updateCardText();
            } else {
                renderList();
            }
        }

        function updateCardText() {
            const qText = document.getElementById('question-text');
            const aText = document.getElementById('answer-text');
            const hint = document.getElementById('reveal-hint');
            const memIcon = document.getElementById('memorize-icon');
            const btnMemStudy = document.getElementById('btn-memorize-study');
            const progressText = document.getElementById('progress-text');

            isRevealed = false;
            aText.classList.add('opacity-0');
            aText.classList.remove('opacity-100');

            // 모든 단어를 다 외웠을 경우
            if (studyWords.length === 0) {
                qText.textContent = '모든 단어 암기 완료!';
                aText.textContent = '전체 목록에서 외움 표시를 해제할 수 있습니다.';
                aText.classList.remove('opacity-0'); // 안내 문구는 즉시 표시
                hint.style.display = 'none';
                btnMemStudy.style.visibility = 'hidden';
                progressText.textContent = '- / -';
                return;
            }

            const mode = document.querySelector('input[name="quizMode"]:checked').value;
            const currentWord = studyWords[currentIndex];
            const wordEn = currentWord[0];
            
            btnMemStudy.style.visibility = 'visible';
            hint.style.display = 'block';

            if(mode === 'en-ko') {
                qText.textContent = currentWord[0];
                aText.textContent = currentWord[1];
            } else {
                qText.textContent = currentWord[1];
                aText.textContent = currentWord[0];
            }

            // 학습 모드에서는 애초에 외운 단어가 제외되므로 항상 '○' 상태
            if(memorizedWords.has(wordEn)) {
                memIcon.textContent = '●';
            } else {
                memIcon.textContent = '○';
            }
            
            progressText.textContent = `${currentIndex + 1} / ${studyWords.length}`;
        }

        function toggleReveal() {
            if (studyWords.length === 0) return;

            const aText = document.getElementById('answer-text');
            const hint = document.getElementById('reveal-hint');
            
            if (!isRevealed) {
                aText.classList.remove('opacity-0');
                aText.classList.add('opacity-100');
                hint.style.display = 'none';
                isRevealed = true;
            } else {
                nextWord();
            }
        }

        function changeWord(direction) {
            if (studyWords.length === 0) return;

            if (direction === 'next') {
                currentIndex = (currentIndex + 1) % studyWords.length;
            } else if (direction === 'prev') {
                currentIndex = (currentIndex - 1 + studyWords.length) % studyWords.length;
            } else if (direction === 'reset') {
                currentIndex = 0;
            }
            updateCardText();
        }

        function nextWord() { changeWord('next'); }
        function prevWord() { changeWord('prev'); }
        
        function shuffleWords() {
            if (studyWords.length === 0) return;
            studyWords.sort(() => Math.random() - 0.5);
            changeWord('reset');
        }
        
        function resetQuiz() { changeWord('reset'); }

        // --- 개별 단어 뜻 가리기 및 전체 뜻 가리기 로직 ---
        
        function toggleAllMeanings() {
            const isAllHidden = hiddenMeanings.size === rawData.length;
            
            if (isAllHidden) {
                hiddenMeanings.clear();
            } else {
                rawData.forEach(w => hiddenMeanings.add(w[0]));
            }
            renderList();
        }

        function toggleIndividualMeaning(wordEn, event) {
            if (hiddenMeanings.has(wordEn)) {
                hiddenMeanings.delete(wordEn);
                event.target.classList.remove('hidden-state');
            } else {
                hiddenMeanings.add(wordEn);
                event.target.classList.add('hidden-state');
            }
            updateGlobalHideButton();
        }

        function updateGlobalHideButton() {
            const btn = document.getElementById('btn-toggle-meanings');
            const isAllHidden = rawData.length > 0 && hiddenMeanings.size === rawData.length;
            
            if (isAllHidden) {
                btn.textContent = '전체 뜻 보이기';
                btn.classList.add('bg-white');
                btn.style.color = '#000'; // 강제 적용된 전체 화이트를 덮어쓰기
            } else {
                btn.textContent = '전체 뜻 가리기';
                btn.classList.remove('bg-white');
                btn.style.color = '#fff';
            }
        }

        function renderList() {
            const container = document.getElementById('voca-table-body');
            document.getElementById('total-words-count').textContent = rawData.length;
            document.getElementById('memorized-count').textContent = memorizedWords.size;
            
            container.innerHTML = rawData.map(w => {
                const isMem = memorizedWords.has(w[0]);
                const isHidden = hiddenMeanings.has(w[0]);
                const safeWord = w[0].replace(/'/g, "\\'"); 
                
                return `
                <tr class="group border-b border-gray-700 last:border-0">
                    <td class="py-4 text-base font-medium w-1/2 align-top cursor-pointer select-none" onclick="toggleMemorizedStatus('${safeWord}')">
                        <span class="mr-2">${isMem ? '●' : '○'}</span>
                        <span class="${isMem ? 'line-through' : ''}">${w[0]}</span>
                    </td>
                    <td class="py-4 text-base w-1/2 align-top">
                        <span class="meaning-text inline-block select-none ${isHidden ? 'hidden-state' : ''}" onclick="toggleIndividualMeaning('${safeWord}', event)" title="클릭하여 뜻 가리기/보이기">${w[1]}</span>
                    </td>
                </tr>
                `;
            }).join('');
            
            updateGlobalHideButton();
            filterList();
        }

        function filterList() {
            const term = document.getElementById('search-bar').value.toLowerCase();
            const rows = document.getElementById('voca-table-body').getElementsByTagName('tr');

            for(let row of rows) {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(term) ? "" : "none";
            }
        }

        // 키보드 지원
        document.addEventListener('keydown', (e) => {
            if(document.getElementById('study-view').classList.contains('hidden')) return;
            if(studyWords.length === 0) return;
            
            if(e.key === 'ArrowRight') nextWord();
            if(e.key === 'ArrowLeft') prevWord();
            if(e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault();
                toggleReveal();
            }
        });

        // Init
        window.onload = () => {
            refreshStudyList();
            updateCardText();
        };
    </script>
</body>
</html>
