<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Notepad</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideUpFadeBlur {
            0% { opacity: 0; transform: translateY(20px); filter: blur(8px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0px); }
        }
        @keyframes scaleIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            70% { transform: scale(1.05) translateY(-2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes slideRightFade {
            0% { opacity: 0; transform: translateX(-20px); filter: blur(4px); }
            100% { opacity: 1; transform: translateX(0); filter: blur(0px); }
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        @keyframes charAppear {
            0% { opacity: 0; transform: translateY(8px); filter: blur(6px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0px); }
        }

        .animate-slide-up { animation: slideUpFadeBlur 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-scale-in { animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pop-in { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-slide-right { animation: slideRightFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        .animate-char {
            display: inline-block;
            animation: charAppear 1.0s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes bounceDelay {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-3px); }
        }
        .typing-dot {
            display: inline-block;
            animation: bounceDelay 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        /* 텍스트 밑을 미끄러지듯 움직이는 언더라인 효과 */
        .focus-underline { position: relative; }
        .focus-underline::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            height: 2px;
            background: #000;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            width: 0;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        .focus-underline:focus-within::after { width: 100%; }
        
        /* 본문 입력 시 좌측에서 스르륵 나타나는 인디케이터 */
        .textarea-container { position: relative; }
        .textarea-container::before {
            content: '';
            position: absolute;
            left: -16px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #000;
            border-radius: 2px;
            opacity: 0;
            transform: scaleY(0.1);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .textarea-container.is-typing::before {
            opacity: 1;
            transform: scaleY(1);
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        ::selection {
            background: #000;
            color: #fff;
        }

        /* 입력 오버레이 전용 스타일 */
        .input-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            transition: opacity 0.2s;
        }
        .overlay-placeholder { color: #d1d5db; }
    </style>
</head>
<body class="min-h-screen bg-white text-black font-sans overflow-hidden relative flex justify-center">

    <!-- 아이콘 SVG 자원 -->
    <svg style="display: none;">
        <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="M12 5v14"/>
        </symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
        </symbol>
        <symbol id="icon-chevron-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6"/>
        </symbol>
        <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
        </symbol>
    </svg>

    <main class="w-full max-w-2xl h-screen flex flex-col relative shadow-[0_0_40px_rgba(0,0,0,0.05)] bg-white overflow-hidden">
        
        <!-- === LIST VIEW === -->
        <div id="view-list" class="absolute inset-0 w-full h-full flex flex-col transition-all duration-500 ease-in-out opacity-100 translate-x-0">
            <header class="px-8 pt-12 pb-6 backdrop-blur-md bg-white/90 sticky top-0 z-10 flex justify-between items-end border-b border-gray-100">
                <div class="animate-slide-right">
                    <h1 class="text-3xl font-light tracking-tight text-black mb-1">메모</h1>
                    <p id="notes-count" class="text-sm text-gray-500 font-medium">0개의 기록</p>
                </div>
            </header>

            <div id="notes-list" class="flex-1 overflow-y-auto px-6 pb-24 hide-scrollbar pt-4">
                <!-- Notes will be injected here -->
            </div>

            <button id="btn-create" class="absolute bottom-8 right-8 w-14 h-14 bg-black text-white rounded-full shadow-[0_10px_30px_rgba(0,0,0,0.2)] hover:shadow-[0_10px_40px_rgba(0,0,0,0.4)] flex items-center justify-center transition-all duration-300 hover:scale-110 active:scale-95 animate-pop-in z-20 group">
                <svg class="w-6 h-6 transition-transform duration-300 group-hover:rotate-90"><use href="#icon-plus"></use></svg>
            </button>
        </div>

        <!-- === EDIT VIEW === -->
        <div id="view-edit" class="absolute inset-0 w-full h-full bg-white flex flex-col transition-all duration-500 ease-out z-30 opacity-0 translate-y-16 pointer-events-none">
            <header class="px-6 py-4 flex items-center justify-between border-b border-gray-100">
                <button id="btn-back" class="p-2 text-gray-400 hover:text-black hover:bg-gray-50 rounded-full transition-all duration-200 group">
                    <svg class="w-6 h-6 transition-transform group-hover:-translate-x-1"><use href="#icon-chevron-left"></use></svg>
                </button>
                <div class="flex items-center gap-2">
                    <button id="btn-delete-current" class="p-2 text-gray-400 hover:text-black hover:bg-gray-50 rounded-full transition-all duration-200 hidden">
                        <svg class="w-5 h-5"><use href="#icon-trash"></use></svg>
                    </button>
                    <button id="btn-save" class="flex items-center gap-2 px-4 py-2 bg-black text-white text-sm font-medium rounded-full hover:bg-gray-800 transition-all duration-200 active:scale-95 shadow-md hover:shadow-lg">
                        <svg class="w-4 h-4"><use href="#icon-check"></use></svg>
                        완료
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto px-8 py-8 hide-scrollbar">
                <div class="flex items-center gap-3 mb-6 animate-fade-in">
                    <p id="edit-date" class="text-xs text-gray-400 font-medium"></p>
                    <span id="typing-indicator" class="text-xs text-black font-semibold flex items-center animate-fade-in opacity-0 transition-opacity">
                        <span class="mr-0.5">입력 중</span>
                        <span class="typing-dot">.</span>
                        <span class="typing-dot">.</span>
                        <span class="typing-dot">.</span>
                    </span>
                </div>

                <div class="relative focus-underline mb-8 animate-fade-in" style="animation-delay: 0.05s">
                    <div class="relative w-full">
                        <div id="title-overlay" aria-hidden="true" class="input-overlay whitespace-pre hide-scrollbar text-3xl font-semibold text-black"></div>
                        <input id="title-input" type="text" placeholder="제목" class="relative w-full bg-transparent outline-none resize-none caret-black hide-scrollbar placeholder:text-transparent text-3xl font-semibold text-black" spellcheck="false" style="color: transparent;">
                    </div>
                </div>

                <div id="content-container" class="textarea-container h-[60vh] animate-fade-in" style="animation-delay: 0.1s">
                    <div class="relative w-full h-full">
                        <div id="content-overlay" aria-hidden="true" class="input-overlay whitespace-pre-wrap break-words hide-scrollbar text-lg text-gray-800 leading-relaxed"></div>
                        <textarea id="content-input" placeholder="당신의 생각을 자유롭게 적어보세요..." class="relative w-full h-full bg-transparent outline-none resize-none caret-black hide-scrollbar placeholder:text-transparent text-lg text-gray-800 leading-relaxed" spellcheck="false" style="color: transparent;"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- State Management ---
        let notes = [];
        let currentNote = null;
        let typingTimeout = null;

        // --- DOM Elements ---
        const viewList = document.getElementById('view-list');
        const viewEdit = document.getElementById('view-edit');
        const notesListEl = document.getElementById('notes-list');
        const notesCountEl = document.getElementById('notes-count');
        const btnCreate = document.getElementById('btn-create');
        const btnBack = document.getElementById('btn-back');
        const btnSave = document.getElementById('btn-save');
        const btnDeleteCurrent = document.getElementById('btn-delete-current');
        
        const editDateEl = document.getElementById('edit-date');
        const typingIndicator = document.getElementById('typing-indicator');
        const contentContainer = document.getElementById('content-container');
        
        const titleInput = document.getElementById('title-input');
        const titleOverlay = document.getElementById('title-overlay');
        const contentInput = document.getElementById('content-input');
        const contentOverlay = document.getElementById('content-overlay');

        // --- Initialization ---
        function init() {
            const saved = localStorage.getItem('minimal_notes');
            if (saved) {
                notes = JSON.parse(saved);
            } else {
                notes = [{
                    id: Date.now().toString(),
                    title: '미니멀 메모장에 오신 것을 환영합니다',
                    content: '복잡함은 덜어내고, 본질에만 집중했습니다.\n\n우측 하단의 + 버튼을 눌러 새로운 메모를 작성해보세요. 모든 변경사항은 브라우저에 안전하게 자동 저장됩니다.',
                    date: new Date().toISOString()
                }];
                saveToLocal();
            }
            renderList();
            setupAnimatedInputs();
            attachEventListeners();
        }

        function saveToLocal() {
            localStorage.setItem('minimal_notes', JSON.stringify(notes));
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Date(dateString).toLocaleDateString('ko-KR', options);
        }

        // --- Rendering ---
        function renderList() {
            notesCountEl.textContent = `${notes.length}개의 기록`;
            
            if (notes.length === 0) {
                notesListEl.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400 animate-scale-in">
                        <div class="w-16 h-16 mb-4 rounded-full bg-gray-50 flex items-center justify-center border border-gray-100">
                            <svg class="w-8 h-8 text-gray-300"><use href="#icon-plus"></use></svg>
                        </div>
                        <p>작성된 메모가 없습니다</p>
                    </div>`;
                return;
            }

            let html = '<div class="grid grid-cols-1 gap-4 mt-2">';
            notes.forEach((note, index) => {
                const dateStr = new Date(note.date).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
                const title = note.title.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const content = note.content.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                html += `
                    <div data-id="${note.id}" class="note-card group relative p-6 bg-white border border-gray-200 rounded-3xl cursor-pointer transition-all duration-400 ease-out hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] hover:border-black hover:-translate-y-1 opacity-0 animate-slide-up" style="animation-delay: ${index * 0.1}s">
                        <div class="pr-8">
                            <h3 class="text-lg font-medium text-black mb-2 truncate">${title}</h3>
                            <p class="text-gray-500 text-sm line-clamp-2 leading-relaxed">${content}</p>
                        </div>
                        <div class="mt-4 flex items-center justify-between">
                            <span class="text-xs text-gray-400 font-medium tracking-wide">${dateStr}</span>
                        </div>
                        <button class="delete-btn absolute top-5 right-5 p-2 text-gray-300 hover:text-black hover:bg-gray-100 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-200 scale-90 group-hover:scale-100">
                            <svg class="w-4 h-4"><use href="#icon-trash"></use></svg>
                        </button>
                    </div>
                `;
            });
            html += '</div>';
            notesListEl.innerHTML = html;

            // Bind list events
            document.querySelectorAll('.note-card').forEach(card => {
                card.addEventListener('click', () => openNote(card.dataset.id));
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.note-card');
                    deleteNote(card.dataset.id, card);
                });
            });
        }

        // --- Actions ---
        function switchView(view) {
            if (view === 'edit') {
                viewList.classList.remove('opacity-100', 'translate-x-0');
                viewList.classList.add('opacity-0', '-translate-x-12', 'pointer-events-none');
                
                viewEdit.classList.remove('opacity-0', 'translate-y-16', 'pointer-events-none');
                viewEdit.classList.add('opacity-100', 'translate-y-0');
            } else {
                viewEdit.classList.remove('opacity-100', 'translate-y-0');
                viewEdit.classList.add('opacity-0', 'translate-y-16', 'pointer-events-none');
                
                viewList.classList.remove('opacity-0', '-translate-x-12', 'pointer-events-none');
                viewList.classList.add('opacity-100', 'translate-x-0');
                
                setTimeout(() => { currentNote = null; }, 400);
            }
        }

        function createNote() {
            currentNote = {
                id: Date.now().toString(),
                title: '',
                content: '',
                date: new Date().toISOString()
            };
            populateEditView();
            switchView('edit');
        }

        function openNote(id) {
            currentNote = { ...notes.find(n => n.id === id) };
            populateEditView();
            switchView('edit');
        }

        function populateEditView() {
            editDateEl.textContent = formatDate(currentNote.date);
            titleInput.value = currentNote.title;
            contentInput.value = currentNote.content;
            
            // Show/hide delete button based on whether it's a saved note
            if (notes.some(n => n.id === currentNote.id)) {
                btnDeleteCurrent.classList.remove('hidden');
            } else {
                btnDeleteCurrent.classList.add('hidden');
            }
            
            // Force re-render of overlays
            titleInput.dispatchEvent(new Event('input'));
            contentInput.dispatchEvent(new Event('input'));
        }

        function saveNote() {
            const titleVal = titleInput.value;
            const contentVal = contentInput.value;
            
            if (!titleVal.trim() && !contentVal.trim()) {
                switchView('list');
                return;
            }

            const updatedNote = {
                ...currentNote,
                title: titleVal.trim() || '제목 없는 메모',
                content: contentVal,
                date: new Date().toISOString()
            };

            const existsIdx = notes.findIndex(n => n.id === updatedNote.id);
            if (existsIdx >= 0) {
                notes[existsIdx] = updatedNote;
            } else {
                notes.unshift(updatedNote);
            }

            saveToLocal();
            renderList();
            switchView('list');
        }

        function deleteNote(id, cardElement) {
            if (cardElement) {
                // List view deletion animation
                cardElement.classList.add('opacity-0', 'scale-90', 'pointer-events-none');
                setTimeout(() => {
                    notes = notes.filter(n => n.id !== id);
                    saveToLocal();
                    renderList();
                }, 300);
            } else {
                // Edit view deletion
                notes = notes.filter(n => n.id !== id);
                saveToLocal();
                renderList();
                switchView('list');
            }
        }

        function triggerTypingStatus() {
            typingIndicator.classList.remove('opacity-0');
            contentContainer.classList.add('is-typing');
            
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                typingIndicator.classList.add('opacity-0');
                contentContainer.classList.remove('is-typing');
            }, 800);
        }

        // --- Animated Input Logic (Replicating React Overlay Behavior) ---
        function attachAnimatedInputLogic(inputEl, overlayEl, placeholderText) {
            let prevLength = (inputEl.value || '').length;
            let animatingIndices = new Set();
            
            const renderOverlay = () => {
                const val = inputEl.value;
                if (!val) {
                    overlayEl.innerHTML = `<span class="overlay-placeholder">${placeholderText}</span>`;
                    return;
                }
                
                // Reconcile DOM nodes to match string length to preserve running CSS animations
                const currentNodes = overlayEl.childNodes;
                
                // Remove placeholder if it exists as the only child
                if (currentNodes.length === 1 && currentNodes[0].className === 'overlay-placeholder') {
                    overlayEl.innerHTML = '';
                }

                while(currentNodes.length > val.length) {
                    overlayEl.removeChild(overlayEl.lastChild);
                }
                while(currentNodes.length < val.length) {
                    overlayEl.appendChild(document.createElement('span'));
                }
                
                for(let i = 0; i < val.length; i++) {
                    const char = val[i];
                    const node = currentNodes[i];
                    
                    if (node.textContent !== char) {
                        node.textContent = char;
                    }
                    
                    if (animatingIndices.has(i) && char !== ' ' && char !== '\n') {
                        if (node.className !== 'animate-char') {
                            node.className = 'animate-char';
                        }
                    } else {
                        if (node.className === 'animate-char') {
                            node.className = '';
                        }
                    }
                }
            };

            inputEl.addEventListener('input', (e) => {
                const val = e.target.value;
                const pos = e.target.selectionStart;
                
                if (val.length > prevLength) {
                    const diff = val.length - prevLength;
                    const newIndices = [];
                    for (let i = 0; i < diff; i++) {
                        newIndices.push(pos - 1 - i);
                    }
                    
                    newIndices.forEach(idx => animatingIndices.add(idx));
                    newIndices.forEach(idx => {
                        setTimeout(() => {
                            animatingIndices.delete(idx);
                            renderOverlay();
                        }, 1000);
                    });
                }
                prevLength = val.length;
                renderOverlay();
                triggerTypingStatus();
            });

            // Scroll synchronization
            inputEl.addEventListener('scroll', () => {
                overlayEl.scrollTop = inputEl.scrollTop;
                overlayEl.scrollLeft = inputEl.scrollLeft;
            });

            // Selection synchronization (hide overlay when text is highlighted)
            const updateSelection = () => {
                if (inputEl.selectionStart !== inputEl.selectionEnd) {
                    overlayEl.classList.add('opacity-0');
                    inputEl.style.color = 'inherit';
                } else {
                    overlayEl.classList.remove('opacity-0');
                    inputEl.style.color = 'transparent';
                }
            };

            inputEl.addEventListener('select', updateSelection);
            inputEl.addEventListener('keyup', updateSelection);
            inputEl.addEventListener('mouseup', updateSelection);
            document.addEventListener('selectionchange', () => {
                if(document.activeElement === inputEl) updateSelection();
            });

            // Initial render
            renderOverlay();
        }

        function setupAnimatedInputs() {
            attachAnimatedInputLogic(titleInput, titleOverlay, "제목");
            attachAnimatedInputLogic(contentInput, contentOverlay, "당신의 생각을 자유롭게 적어보세요...");
        }

        function attachEventListeners() {
            btnCreate.addEventListener('click', createNote);
            btnBack.addEventListener('click', () => switchView('list'));
            btnSave.addEventListener('click', saveNote);
            btnDeleteCurrent.addEventListener('click', () => {
                if (currentNote && currentNote.id) {
                    deleteNote(currentNote.id, null);
                }
            });
        }

        // Run
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
