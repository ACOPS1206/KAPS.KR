<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Typing - Advanced</title>
    <style>
        :root {
            --bg: #000000;
            --text-off: #555555; 
            --text-on: #ffffff;
            --accent: #a29bfe; 
            --error: #ff5555;
            --font-main: 'Inter', 'Pretendard', -apple-system, sans-serif;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg);
            color: var(--text-on);
            font-family: var(--font-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            transition: background 0.5s ease;
        }

        .container {
            width: 85%;
            max-width: 900px;
            position: relative;
            animation: containerIn 0.8s ease-out;
        }

        @keyframes containerIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top Navigation */
        .top-nav {
            position: absolute;
            top: -100px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
        }

        .lang-toggle {
            display: flex;
            gap: 30px;
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: var(--text-off);
            cursor: pointer;
        }

        .lang-toggle span { transition: color 0.3s; }
        .lang-toggle span.active {
            color: var(--accent);
            font-weight: 700;
        }

        /* Quote Area */
        #quote-display {
            font-size: clamp(1.4rem, 4.2vw, 2.3rem);
            line-height: 1.6;
            min-height: 160px;
            word-break: keep-all;
            margin-bottom: 40px;
            font-weight: 300;
            transition: opacity 0.3s ease;
            cursor: text;
        }

        .char {
            color: var(--text-off);
            transition: all 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
            white-space: pre;
            display: inline-block;
        }

        .char.correct { color: var(--text-on); }
        
        .char.incorrect { 
            color: var(--error); 
            transform: translateY(-4px); 
            text-shadow: 0 5px 15px var(--error-shadow, rgba(255, 85, 85, 0.3));
            animation: shake 0.2s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { margin-left: 0; }
            25% { margin-left: -2px; }
            75% { margin-left: 2px; }
        }

        .char.current { 
            color: var(--accent);
            transform: translateY(-2px); 
        }

        /* Smooth Cursor */
        #smooth-cursor {
            position: absolute;
            top: 0;
            left: 0;
            height: 2px;
            border-radius: 2px;
            background: var(--accent);
            transition: transform 0.15s cubic-bezier(0.2, 0, 0, 1), width 0.15s cubic-bezier(0.2, 0, 0, 1);
            pointer-events: none;
            will-change: transform, width;
            opacity: 1;
        }

        #smooth-cursor.blinking {
            animation: smoothBlink 1s infinite;
        }

        @keyframes smoothBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #input-field {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        /* Stats Footer */
        .stats-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid #111;
        }

        .stat-item { display: flex; flex-direction: column; gap: 4px; }
        .stat-val {
            font-size: 2.2rem;
            font-weight: 200;
            color: var(--text-on);
            font-family: 'Courier New', monospace;
        }
        .stat-unit {
            font-size: 0.6rem;
            color: var(--text-off);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Buttons */
        .btns { display: flex; gap: 20px; z-index: 10; position: relative;}
        .btn {
            background: none;
            border: none;
            color: var(--text-off);
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 2px;
            padding: 8px 0;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn:hover { color: var(--accent); }
        .btn-finish { color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; border-radius: 4px; }
        .btn-finish:hover { background: var(--accent); color: #000; }

        /* Modal / Settings / Results */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .modal-content {
            width: 90%;
            max-width: 550px;
            animation: modalIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-section { margin-bottom: 30px; border-bottom: 1px solid #111; padding-bottom: 20px; }
        .modal-section:last-of-type { border-bottom: none; }
        .modal h2 { font-weight: 200; margin-bottom: 15px; letter-spacing: 4px; color: var(--text-off); text-align: center; font-size: 1rem;}
        
        .theme-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .theme-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .theme-dot:hover { transform: scale(1.3); }
        .theme-dot.active { border: 2px solid #fff; transform: scale(1.2); }

        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .mode-btn {
            font-size: 0.7rem;
            color: var(--text-off);
            cursor: pointer;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .mode-btn.active { color: var(--accent); font-weight: bold; }

        .modal input[type="text"] {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #222;
            color: var(--text-on);
            font-size: 1.1rem;
            padding: 15px 0;
            margin-bottom: 15px;
            font-family: var(--font-main);
            text-align: center;
        }
        .modal input[type="text"]:focus { border-color: var(--accent); }

        .custom-list { max-height: 150px; overflow-y: auto; margin-bottom: 10px; scrollbar-width: none; }
        .custom-list::-webkit-scrollbar { display: none; }
        .custom-item {
            padding: 10px 0;
            border-bottom: 1px solid #111;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #888;
        }
        .delete-btn { color: var(--error); cursor: pointer; opacity: 0.5; font-size: 0.7rem; }
        .delete-btn:hover { opacity: 1; }

        /* Results Display */
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        .result-item { display: flex; flex-direction: column; gap: 5px; }
        .result-label { font-size: 0.6rem; color: var(--text-off); letter-spacing: 1px; }
        .result-value { font-size: 1.8rem; color: var(--accent); font-family: 'Courier New', monospace; }

        .session-list {
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.75rem;
            color: #666;
            padding: 10px;
            background: #050505;
            border-radius: 4px;
        }
        .session-item { margin-bottom: 8px; border-bottom: 1px solid #111; padding-bottom: 4px; }
        .session-item:last-child { border-bottom: none; }

        #msg-box {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            padding: 8px 18px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0;
            transition: all 0.4s;
            pointer-events: none;
            z-index: 200;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <div class="lang-toggle">
            <span id="btn-kr" class="active" onclick="setLanguage('kr')">KR</span>
            <span id="btn-en" onclick="setLanguage('en')">EN</span>
        </div>
    </div>

    <div id="quote-display"></div>
    
    <input type="text" id="input-field" autofocus autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <div class="stats-footer">
        <div style="display: flex; gap: 50px;">
            <div class="stat-item">
                <span class="stat-unit" id="unit-label">CPM</span>
                <span class="stat-val" id="wpm">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-unit">ACC</span>
                <span class="stat-val"><span id="acc">0</span><small style="font-size: 0.7rem;">%</small></span>
            </div>
        </div>

        <div class="btns">
            <button class="btn btn-finish" onclick="finishSession()">Finish</button>
            <button class="btn" onclick="toggleModal('settings', true)">Settings</button>
            <button class="btn" onclick="resetQuote()">Reset</button>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div id="modal-settings" class="modal">
    <div class="modal-content">
        <div class="modal-section">
            <h2>THEME</h2>
            <div class="theme-selector" id="theme-container">
                <div class="theme-dot" data-color="#a29bfe" data-error="#ff7675" style="background: #a29bfe;" onclick="setTheme('#a29bfe', '#ff7675')"></div>
                <div class="theme-dot" data-color="#55efc4" data-error="#ff6b81" style="background: #55efc4;" onclick="setTheme('#55efc4', '#ff6b81')"></div>
                <div class="theme-dot" data-color="#ff8a8a" data-error="#c23616" style="background: #ff8a8a;" onclick="setTheme('#ff8a8a', '#c23616')"></div>
                <div class="theme-dot" data-color="#81ecec" data-error="#ff4757" style="background: #81ecec;" onclick="setTheme('#81ecec', '#ff4757')"></div>
                <div class="theme-dot" data-color="#feca57" data-error="#ff5252" style="background: #feca57;" onclick="setTheme('#feca57', '#ff5252')"></div>
            </div>
        </div>

        <div class="modal-section">
            <h2>REALTIME SHAKE (흔들림 감성)</h2>
            <div class="mode-toggle">
                <span id="shake-on" class="mode-btn active" onclick="setShakeEffect(true)">ON</span>
                <span id="shake-off" class="mode-btn" onclick="setShakeEffect(false)">OFF</span>
            </div>
        </div>

        <div class="modal-section">
            <h2>PRACTICE MODE</h2>
            <div class="mode-toggle">
                <span id="mode-all" class="mode-btn active" onclick="setPracticeMode('all')">ALL QUOTES</span>
                <span id="mode-custom" class="mode-btn" onclick="setPracticeMode('custom')">CUSTOM ONLY</span>
            </div>
        </div>

        <div class="modal-section">
            <h2>ADD QUOTES</h2>
            <input type="text" id="custom-input" placeholder="새로운 문장을 입력하고 Enter..." maxlength="120">
            <div class="custom-list" id="custom-list"></div>
        </div>
        
        <button class="btn" style="width: 100%; color: var(--text-on); border-top: 1px solid #111; padding-top: 20px; font-weight: 700;" onclick="toggleModal('settings', false)">CLOSE</button>
        
        <!-- 이스터에그: 리눅스 버튼 (매우 어둡게 숨김) -->
        <span onclick="activateLinuxMode()" style="position: absolute; bottom: 15px; right: 20px; font-size: 10px; color: #111; cursor: pointer; user-select: none; transition: color 0.3s;">리눅스</span>
    </div>
</div>

<!-- Finish / Result Modal -->
<div id="modal-result" class="modal">
    <div class="modal-content">
        <div class="modal-section">
            <h2 style="color: var(--accent); letter-spacing: 6px;">SESSION SUMMARY</h2>
            <div class="result-grid">
                <div class="result-item">
                    <span class="result-label">SENTENCES</span>
                    <span class="result-value" id="res-count">0</span>
                </div>
                <div class="result-item">
                    <span class="result-label" id="res-unit-label">AVG CPM</span>
                    <span class="result-value" id="res-speed">0</span>
                </div>
                <div class="result-item">
                    <span class="result-label">AVG ACC</span>
                    <span class="result-value" id="res-acc">0%</span>
                </div>
            </div>
        </div>

        <div class="modal-section" id="res-history-section">
            <h2>PRACTICED LIST</h2>
            <div class="session-list" id="res-history">
                <!-- History list here -->
            </div>
        </div>
        
        <button class="btn" style="width: 100%; color: var(--accent); border-top: 1px solid #111; padding-top: 20px; font-weight: 700; letter-spacing: 2px;" onclick="closeResult()">NEW SESSION</button>
    </div>
</div>

<div id="msg-box"></div>

<script>
    // --- Constants & Data ---
    const DEFAULT_QUOTES_KR = [
        "별을 노래하는 마음으로 모든 죽어가는 것을 사랑해야지.",
        "가장 찬란한 순간은 아직 오지 않았다.",
        "우리는 우리가 반복적으로 하는 행동의 결과이다.",
        "천천히 가는 것을 두려워 말고, 멈춰 서는 것을 두려워하라.",
        "작은 기회가 때로는 위대한 업적의 시작이다.",
        "실패는 다시 시작할 수 있는 기회일 뿐이다.",
        "햇빛은 누구에게나 공평하게 내리쬔다.",
        "단순함이 궁극의 정교함이다."
    ];

    const DEFAULT_QUOTES_EN = [
        "Simplicity is the ultimate sophistication.",
        "Stay hungry, stay foolish.",
        "The best way to predict the future is to create it.",
        "Success is not final, failure is not fatal.",
        "Believe you can and you're halfway there.",
        "Do what you love, love what you do.",
        "Every moment is a fresh beginning."
    ];

    // 한글 분해용 상수
    const CHO_SUNG = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
    const JOONG_SUNG = ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'];
    const JONG_SUNG = ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

    // --- State ---
    let currentLang = 'kr';
    let practiceMode = 'all'; 
    let customQuotes = JSON.parse(localStorage.getItem('typing_custom_quotes') || '[]');
    let sessionHistory = []; 
    
    let currentQuoteText = "";
    let startTime = null;
    let activeModal = null;
    let erroredIndices = new Set();
    let isComposing = false; 
    let isLinuxMode = false; 
    let shakeEffect = JSON.parse(localStorage.getItem('typing_shake_effect') ?? 'true'); // 추가된 상태

    // --- Elements ---
    const display = document.getElementById('quote-display');
    const input = document.getElementById('input-field');
    const wpmEl = document.getElementById('wpm');
    const accEl = document.getElementById('acc');
    const customListEl = document.getElementById('custom-list');

    // --- Utility Functions ---
    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag)
        );
    }

    function getHangulComponents(char) {
        const code = char.charCodeAt(0);
        if (code >= 0xAC00 && code <= 0xD7A3) {
            const offset = code - 0xAC00;
            return {
                cho: CHO_SUNG[Math.floor(offset / 588)],
                joong: JOONG_SUNG[Math.floor((offset % 588) / 28)],
                jong: JONG_SUNG[offset % 28]
            };
        }
        if (CHO_SUNG.includes(char)) return { cho: char, joong: '', jong: '' };
        if (JOONG_SUNG.includes(char)) return { cho: '', joong: char, jong: '' };
        return null;
    }

    // 실제 타수(키스트로크) 계산
    function getStrokeCount(char) {
        const code = char.charCodeAt(0);
        let strokes = 1; 
        if (code >= 0xAC00 && code <= 0xD7A3) {
            strokes = 0;
            const comp = getHangulComponents(char);
            const doubleCho = ['ㄲ', 'ㄸ', 'ㅃ', 'ㅆ', 'ㅉ'];
            const doubleJoong = ['ㅒ', 'ㅖ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅢ'];
            const doubleJong = ['ㄲ', 'ㄳ', 'ㄵ', 'ㄶ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅄ', 'ㅆ'];
            
            strokes += doubleCho.includes(comp.cho) ? 2 : 1;
            strokes += doubleJoong.includes(comp.joong) ? 2 : 1;
            if (comp.jong) strokes += doubleJong.includes(comp.jong) ? 2 : 1;
        } else if (CHO_SUNG.includes(char) || JOONG_SUNG.includes(char)) {
            strokes = (['ㄲ', 'ㄸ', 'ㅃ', 'ㅆ', 'ㅉ', 'ㅒ', 'ㅖ'].includes(char)) ? 2 : 1;
        }
        return strokes;
    }

    function calcTotalStrokes(str) {
        let count = 0;
        for(let char of str) count += getStrokeCount(char);
        return count;
    }

    // --- Global Functions ---
    window.setLanguage = (lang) => {
        currentLang = lang;
        document.getElementById('btn-kr').classList.toggle('active', lang === 'kr');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('unit-label').innerText = lang === 'kr' ? 'CPM' : 'WPM';
        resetQuote();
    };

    window.addEventListener('resize', () => {
        if(currentQuoteText) updateCursor(input.value.length);
    });

    // 그림자 효과를 위한 RGBA 변환 함수
    function getRgba(hex, alpha) {
        let color = hex.replace('#', '');
        let r = parseInt(color.substring(0, 2), 16);
        let g = parseInt(color.substring(2, 4), 16);
        let b = parseInt(color.substring(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    window.setTheme = (color, errorColor = '#ff4757') => {
        document.documentElement.style.setProperty('--accent', color);
        
        // 기계적 계산 대신 각 테마에 가장 잘 어울리도록 엄선된 예쁜 오류 색상 적용
        document.documentElement.style.setProperty('--error', errorColor);
        document.documentElement.style.setProperty('--error-shadow', getRgba(errorColor, 0.4));

        localStorage.setItem('typing_theme', color);
        localStorage.setItem('typing_theme_error', errorColor);
        
        document.querySelectorAll('.theme-dot').forEach(dot => {
            dot.classList.toggle('active', dot.dataset.color === color);
        });
        showMessage(`Theme Updated`);
    };

    window.setPracticeMode = (mode) => {
        practiceMode = mode;
        isLinuxMode = false; 
        document.getElementById('mode-all').classList.toggle('active', mode === 'all');
        document.getElementById('mode-custom').classList.toggle('active', mode === 'custom');
        resetQuote();
    };

    window.setShakeEffect = (isOn) => {
        shakeEffect = isOn;
        localStorage.setItem('typing_shake_effect', isOn);
        document.getElementById('shake-on').classList.toggle('active', isOn);
        document.getElementById('shake-off').classList.toggle('active', !isOn);
    };

    window.activateLinuxMode = () => {
        isLinuxMode = true;
        setTheme('#ff2a2a', '#880000');
        toggleModal('settings', false);
        showMessage('리눅스 찬양하라');
        resetQuote();
    };

    window.toggleModal = (type, show) => {
        const modal = document.getElementById(`modal-${type}`);
        if (show) {
            modal.style.display = 'flex';
            activeModal = type;
            if (type === 'settings') renderCustomList();
        } else {
            modal.style.display = 'none';
            activeModal = null;
            if(!input.disabled) setTimeout(() => input.focus(), 100);
        }
    };

    document.addEventListener('click', (e) => {
        const isInteractive = e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.closest('.btns') || e.target.closest('.modal-content');
        if (!activeModal && !isInteractive && !input.disabled && e.pointerType === 'mouse') {
            input.focus();
        }
    });

    display.addEventListener('click', () => {
        if (!activeModal && !input.disabled) input.focus();
    });

    input.addEventListener('paste', e => e.preventDefault());
    input.addEventListener('keydown', e => {
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
            e.preventDefault();
        }
    });

    input.addEventListener('compositionstart', () => {
        isComposing = true;
    });
    
    input.addEventListener('compositionend', () => {
        isComposing = false;
        // 조합이 완료된 순간, 보류해두었던 마지막 글자의 오타 여부를 최종 확정합니다.
        if (!input.disabled) {
            evaluateInput();
            checkQuoteCompletion();
        }
    });

    window.resetQuote = () => {
        wpmEl.innerText = '0';
        accEl.innerText = '0';
        erroredIndices.clear();
        renderQuote();
    };

    function renderQuote() {
        display.style.opacity = 0;
        
        setTimeout(() => {
            const filteredCustom = customQuotes.filter(q => q.lang === currentLang).map(q => q.text);
            let pool = [];

            if (isLinuxMode) {
                pool = ["리눅스", "찬양하라"];
            } else if (practiceMode === 'custom') {
                pool = filteredCustom;
                if (pool.length === 0) {
                    currentQuoteText = "";
                    input.value = "";
                    input.disabled = true;
                    erroredIndices.clear();
                    display.innerHTML = `<span style="color:var(--accent); font-size:1.2rem;">저장된 문장이 없습니다. Settings에서 추가해주세요.</span>`;
                    display.style.opacity = 1;
                    return;
                }
            } else {
                pool = [...(currentLang === 'kr' ? DEFAULT_QUOTES_KR : DEFAULT_QUOTES_EN), ...filteredCustom];
            }
            
            input.disabled = false;
            let nextQuote = pool[Math.floor(Math.random() * pool.length)];
            
            const uniqueQuotes = new Set(pool);
            if (uniqueQuotes.size > 1) {
                while(nextQuote === currentQuoteText) {
                    nextQuote = pool[Math.floor(Math.random() * pool.length)];
                }
            }
            
            currentQuoteText = nextQuote;
            display.innerHTML = '';
            currentQuoteText.split('').forEach(char => {
                const span = document.createElement('span');
                span.innerText = char;
                span.className = 'char';
                display.appendChild(span);
            });

            const cursorEl = document.createElement('div');
            cursorEl.id = 'smooth-cursor';
            display.appendChild(cursorEl);

            display.style.opacity = 1;
            input.value = '';
            input.maxLength = currentQuoteText.length;
            startTime = null;
            erroredIndices.clear();
            updateCursor(0);
            
            input.focus();
        }, 300);
    }

    function updateCursor(index) {
        const spans = display.querySelectorAll('.char');
        const cursor = document.getElementById('smooth-cursor');
        
        spans.forEach(s => s.classList.remove('current'));
        
        if (!cursor) return;

        let targetSpan = spans[index];
        let x = 0;
        let y = 0;
        let width = 0;

        if (targetSpan) {
            targetSpan.classList.add('current');
            x = targetSpan.offsetLeft;
            y = targetSpan.offsetTop + targetSpan.offsetHeight + 2; 
            width = targetSpan.offsetWidth;
        } else if (index > 0 && index >= spans.length) {
            const lastSpan = spans[spans.length - 1];
            x = lastSpan.offsetLeft + lastSpan.offsetWidth;
            y = lastSpan.offsetTop + lastSpan.offsetHeight + 2; 
            width = 10; 
        }

        cursor.style.transform = `translate(${x}px, ${y}px)`;
        cursor.style.width = `${width}px`;

        cursor.classList.remove('blinking');
        clearTimeout(cursor.blinkTimeout);
        cursor.blinkTimeout = setTimeout(() => {
            cursor.classList.add('blinking');
        }, 500);
    }

    // --- 수정된 핵심 입력 및 계산 로직 ---
    function evaluateInput() {
        if (!currentQuoteText) return;

        const spans = display.querySelectorAll('.char');
        const chars = input.value.split('');

        spans.forEach((span, i) => {
            const c = chars[i];
            const target = span.innerText;

            if (c == null) {
                span.className = 'char';
            } else if (c === target) {
                span.className = 'char correct';
            } else { 
                // 한글 조합 중인 현재 마지막 글자 처리
                if (i === chars.length - 1 && isComposing) {
                    if (shakeEffect) {
                        // 감점(erroredIndices.add)은 하지 않고 시각적인 흔들림 감성만 실시간으로 부여
                        span.classList.remove('incorrect');
                        void span.offsetWidth; // 애니메이션 매번 재시작을 위한 리플로우(Reflow) 강제
                        span.className = 'char incorrect'; 
                    } else {
                        span.className = 'char'; 
                    }
                } else {
                    if (!span.classList.contains('incorrect')) {
                        span.className = 'char incorrect';
                        erroredIndices.add(i); // 조합이 끝났는데 틀렸다면 진짜 감점
                    }
                }
            }
        });

        updateCursor(input.value.length);
        calculateStats();
    }

    input.addEventListener('input', () => {
        if (activeModal || !currentQuoteText) return;
        
        // 시작 시간 보정
        if (!startTime && input.value.length > 0) {
            startTime = new Date(Date.now() - 400);
        }

        evaluateInput();
        checkQuoteCompletion();
    });

    function checkQuoteCompletion() {
        if (!currentQuoteText || input.disabled) return;

        if (input.value === currentQuoteText) {
            finishQuote();
        } 
        else if (input.value.length >= currentQuoteText.length && !isComposing) {
            finishQuote();
        }
    }

    function finishQuote() {
        input.disabled = true; 
        display.style.opacity = 0; 
        saveSessionAndNext();
    }

    function calculateStats() {
        if (!startTime || input.value.length === 0) return;
        
        const elapsedSec = (new Date() - startTime) / 1000;
        
        const typedStrokes = currentLang === 'kr' 
            ? calcTotalStrokes(input.value) 
            : input.value.length; 

        // [수정] 타수 계산 로직 개선 
        // 기존의 강제 시간 고정(1.0초) 코드를 지우고, 순수 경과 시간으로 정확하게 속도를 반영합니다.
        // 0으로 나누어지는 오류 방지 차원에서만 최소 0.1초를 안전 장치로 둡니다.
        const safeSec = Math.max(elapsedSec, 0.1); 
        let currentSpeed = 0;
        
        if (currentLang === 'en') {
            currentSpeed = Math.round((typedStrokes / 5) / (safeSec / 60));
        } else {
            currentSpeed = Math.round((typedStrokes * 60) / safeSec);
        }

        let currentErrors = 0;
        for (let errIdx of erroredIndices) {
            if (errIdx < input.value.length) {
                currentErrors++;
            }
        }
        
        let currentAcc = 100;
        if (input.value.length > 0) {
            currentAcc = Math.round(((Math.max(0, input.value.length - currentErrors)) / input.value.length) * 100);
        }
        
        wpmEl.innerText = currentSpeed > 0 ? currentSpeed : 0;
        accEl.innerText = Math.min(100, Math.max(0, currentAcc));
    }
    // -----------------------------------

    function saveSessionAndNext() {
        sessionHistory.push({
            text: currentQuoteText,
            speed: parseInt(wpmEl.innerText),
            acc: parseInt(accEl.innerText)
        });
        setTimeout(renderQuote, 400); 
    }

    window.finishSession = () => {
        if (sessionHistory.length === 0) {
            showMessage("완료된 문장이 없습니다.");
            return;
        }

        const count = sessionHistory.length;
        const avgSpeed = Math.round(sessionHistory.reduce((a, b) => a + b.speed, 0) / count);
        const avgAcc = Math.round(sessionHistory.reduce((a, b) => a + b.acc, 0) / count);

        document.getElementById('res-count').innerText = count;
        document.getElementById('res-speed').innerText = avgSpeed;
        document.getElementById('res-acc').innerText = avgAcc + '%';
        document.getElementById('res-unit-label').innerText = currentLang === 'kr' ? 'AVG CPM' : 'AVG WPM';

        const historyList = document.getElementById('res-history');
        historyList.innerHTML = sessionHistory.map(item => `
            <div class="session-item">
                <div style="color: #eee; margin-bottom: 3px;">${escapeHTML(item.text)}</div>
                <div style="font-size: 0.65rem; color: #888;">${item.speed} ${currentLang === 'kr' ? 'CPM' : 'WPM'} / ${item.acc}% Accuracy</div>
            </div>
        `).join('');

        toggleModal('result', true);
    };

    window.closeResult = () => {
        sessionHistory = []; 
        toggleModal('result', false);
        resetQuote();
    };

    document.getElementById('custom-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            const text = e.target.value.trim();
            if (!text) return;
            const newQuote = { id: Date.now().toString(), text: text, lang: currentLang };
            customQuotes.push(newQuote);
            localStorage.setItem('typing_custom_quotes', JSON.stringify(customQuotes));
            e.target.value = '';
            renderCustomList();
            showMessage('Added');
            
            if (practiceMode === 'custom' && !currentQuoteText) {
                resetQuote();
            }
        }
    });

    window.deleteQuote = (id) => {
        customQuotes = customQuotes.filter(q => q.id !== id);
        localStorage.setItem('typing_custom_quotes', JSON.stringify(customQuotes));
        renderCustomList();
    };

    function renderCustomList() {
        const filtered = customQuotes.filter(q => q.lang === currentLang);
        if (filtered.length === 0) {
            customListEl.innerHTML = '<div style="color:#444; font-size:0.7rem; text-align:center; padding: 20px 0;">Empty.</div>';
            return;
        }
        customListEl.innerHTML = filtered.map(q => `
            <div class="custom-item">
                <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 80%;">${escapeHTML(q.text)}</span>
                <span class="delete-btn" onclick="deleteQuote('${q.id}')">Delete</span>
            </div>
        `).join('');
    }

    function showMessage(msg) {
        const b = document.getElementById('msg-box');
        b.innerText = msg;
        b.style.opacity = 1;
        setTimeout(() => b.style.opacity = 0, 1500);
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem('typing_theme');
        const savedError = localStorage.getItem('typing_theme_error');
        
        if (savedTheme) setTheme(savedTheme, savedError || '#ff7675');
        else setTheme('#a29bfe', '#ff7675'); 
        
        setShakeEffect(shakeEffect); // 흔들림 효과 설정 반영
        
        renderQuote();
    };
</script>

</body>
</html>
