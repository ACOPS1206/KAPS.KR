<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Typing - Classic Motion Refined</title>
    <style>
        :root {
            --bg: #000000;
            --text-off: #2a2a2a;
            --text-on: #ffffff;
            --accent: #a29bfe; /* 기본 연보라 */
            --error: #ff5555;
            --font-main: 'Inter', 'Pretendard', -apple-system, sans-serif;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg);
            color: var(--text-on);
            font-family: var(--font-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            transition: background 0.5s ease;
        }

        .container {
            width: 85%;
            max-width: 900px;
            position: relative;
            animation: containerIn 0.8s ease-out;
        }

        @keyframes containerIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top Navigation */
        .top-nav {
            position: absolute;
            top: -100px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
        }

        .lang-toggle {
            display: flex;
            gap: 30px;
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: var(--text-off);
            cursor: pointer;
        }

        .lang-toggle span { transition: color 0.3s; }
        .lang-toggle span.active {
            color: var(--accent);
            font-weight: 700;
        }

        /* Quote Area */
        #quote-display {
            font-size: clamp(1.4rem, 4.2vw, 2.3rem);
            line-height: 1.6;
            min-height: 160px;
            word-break: keep-all;
            margin-bottom: 40px;
            font-weight: 300;
            transition: opacity 0.3s ease;
        }

        .char {
            color: var(--text-off);
            /* 클래식 버전의 탄성 애니메이션 복구 */
            transition: all 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            position: relative;
            white-space: pre;
            display: inline-block;
        }

        .char.correct { color: var(--text-on); }
        .char.incorrect { 
            color: var(--error); 
            transform: translateY(-4px); /* 요청하신 대로 높이 하향 조정 (-8 -> -4) */
            text-shadow: 0 5px 15px rgba(255, 85, 85, 0.3);
            animation: shake 0.2s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { margin-left: 0; }
            25% { margin-left: -2px; }
            75% { margin-left: 2px; }
        }

        .char.current { 
            color: var(--accent);
            transform: translateY(-2px); /* 요청하신 대로 높이 하향 조정 (-4 -> -2) */
        }
        
        .char.current::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        #input-field {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        /* Stats Footer */
        .stats-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid #111;
        }

        .stat-item { display: flex; flex-direction: column; gap: 4px; }
        .stat-val {
            font-size: 2.2rem;
            font-weight: 200;
            color: var(--text-on);
            font-family: 'Courier New', monospace;
        }
        .stat-unit {
            font-size: 0.6rem;
            color: var(--text-off);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Buttons */
        .btns { display: flex; gap: 20px; }
        .btn {
            background: none;
            border: none;
            color: var(--text-off);
            cursor: pointer;
            font-size: 0.7rem;
            letter-spacing: 2px;
            padding: 8px 0;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn:hover { color: var(--accent); }

        /* Modal / Settings */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .modal-content {
            width: 90%;
            max-width: 550px;
            animation: modalIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-section { margin-bottom: 30px; border-bottom: 1px solid #111; padding-bottom: 20px; }
        .modal-section:last-of-type { border-bottom: none; }
        .modal h2 { font-weight: 200; margin-bottom: 15px; letter-spacing: 4px; color: var(--text-off); text-align: center; font-size: 1rem;}
        
        .theme-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .theme-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .theme-dot:hover { transform: scale(1.3); }
        .theme-dot.active { border: 2px solid #fff; transform: scale(1.2); }

        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .mode-btn {
            font-size: 0.7rem;
            color: var(--text-off);
            cursor: pointer;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .mode-btn.active { color: var(--accent); font-weight: bold; }

        .modal input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #222;
            color: var(--text-on);
            font-size: 1.1rem;
            padding: 15px 0;
            margin-bottom: 15px;
            font-family: var(--font-main);
            text-align: center;
        }
        .modal input:focus { border-color: var(--accent); }

        .custom-list { max-height: 150px; overflow-y: auto; margin-bottom: 10px; scrollbar-width: none; }
        .custom-list::-webkit-scrollbar { display: none; }
        .custom-item {
            padding: 10px 0;
            border-bottom: 1px solid #111;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #444;
        }
        .delete-btn { color: var(--error); cursor: pointer; opacity: 0.5; font-size: 0.7rem; }
        .delete-btn:hover { opacity: 1; }

        #msg-box {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            padding: 8px 18px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0;
            transition: all 0.4s;
            pointer-events: none;
            z-index: 200;
            border-radius: 4px;
        }
    </style>
</head>
<body onclick="document.getElementById('input-field').focus()">

<div class="container">
    <div class="top-nav">
        <div class="lang-toggle">
            <span id="btn-kr" class="active" onclick="setLanguage('kr')">KR</span>
            <span id="btn-en" onclick="setLanguage('en')">EN</span>
        </div>
    </div>

    <div id="quote-display"></div>
    
    <input type="text" id="input-field" autofocus autocomplete="off">

    <div class="stats-footer">
        <div style="display: flex; gap: 50px;">
            <div class="stat-item">
                <span class="stat-unit" id="unit-label">CPM</span>
                <span class="stat-val" id="wpm">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-unit">ACC</span>
                <span class="stat-val"><span id="acc">0</span><small style="font-size: 0.7rem;">%</small></span>
            </div>
        </div>

        <div class="btns">
            <button class="btn" onclick="toggleModal(true)">Settings</button>
            <button class="btn" onclick="resetQuote()">Reset</button>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-section">
            <h2>THEME</h2>
            <div class="theme-selector">
                <div class="theme-dot active" style="background: #a29bfe;" onclick="setTheme('#a29bfe', this)"></div>
                <div class="theme-dot" style="background: #55efc4;" onclick="setTheme('#55efc4', this)"></div>
                <div class="theme-dot" style="background: #ff8a8a;" onclick="setTheme('#ff8a8a', this)"></div>
                <div class="theme-dot" style="background: #81ecec;" onclick="setTheme('#81ecec', this)"></div>
                <div class="theme-dot" style="background: #feca57;" onclick="setTheme('#feca57', this)"></div>
            </div>
        </div>

        <div class="modal-section">
            <h2>PRACTICE MODE</h2>
            <div class="mode-toggle">
                <span id="mode-all" class="mode-btn active" onclick="setPracticeMode('all')">ALL QUOTES</span>
                <span id="mode-custom" class="mode-btn" onclick="setPracticeMode('custom')">CUSTOM ONLY</span>
            </div>
        </div>

        <div class="modal-section">
            <h2>ADD QUOTES</h2>
            <input type="text" id="custom-input" placeholder="새로운 문장을 입력하고 Enter..." maxlength="120">
            <div class="custom-list" id="custom-list"></div>
        </div>
        
        <button class="btn" style="width: 100%; color: var(--text-on); border-top: 1px solid #111; padding-top: 20px; font-weight: 700;" onclick="toggleModal(false)">CLOSE</button>
    </div>
</div>

<div id="msg-box"></div>

<script>
    // Constants
    const DEFAULT_QUOTES_KR = [
        "별을 노래하는 마음으로 모든 죽어가는 것을 사랑해야지.",
        "가장 찬란한 순간은 아직 오지 않았다.",
        "우리는 우리가 반복적으로 하는 행동의 결과이다.",
        "천천히 가는 것을 두려워 말고, 멈춰 서는 것을 두려워하라.",
        "작은 기회가 때로는 위대한 업적의 시작이다.",
        "시작이 반이다라는 말은 시작만 해도 절반은 성공이다.",
        "실패는 다시 시작할 수 있는 기회일 뿐이다.",
        "나의 사전에 불가능이란 단어는 없다.",
        "행복은 습관이다, 그것을 몸에 익혀라.",
        "가장 큰 위험은 아무런 위험도 감수하지 않는 것이다.",
        "내일의 꿈을 가로막는 유일한 장애물은 오늘의 의심이다.",
        "햇빛은 누구에게나 공평하게 내리쬔다.",
        "인생은 우리가 만드는 것이다, 언제나 그래왔고 앞으로도 그럴 것이다.",
        "고통은 지나가지만 아름다움은 남는다.",
        "단순함이 궁극의 정교함이다.",
        "길을 잃는다는 것은 곧 길을 찾게 된다는 것이다.",
        "자신을 믿는 순간 어떻게 살아야 할지 알게 된다.",
        "인생은 가까이서 보면 비극이지만 멀리서 보면 희극이다.",
        "지금 이 순간이 당신의 가장 젊은 날이다."
    ];

    const DEFAULT_QUOTES_EN = [
        "Simplicity is the ultimate sophistication.",
        "Stay hungry, stay foolish.",
        "The best way to predict the future is to create it.",
        "To be or not to be, that is the question.",
        "Success is not final, failure is not fatal.",
        "Believe you can and you're halfway there.",
        "Your time is limited, don't waste it living someone else's life.",
        "Do what you love, love what you do.",
        "Dream big and dare to fail.",
        "The quick brown fox jumps over the lazy dog.",
        "Quality is not an act, it is a habit.",
        "Be yourself; everyone else is already taken.",
        "In the middle of every difficulty lies opportunity.",
        "Focus on the journey, not the destination.",
        "Action is the foundational key to all success.",
        "Every moment is a fresh beginning.",
        "Whatever you are, be a good one.",
        "The power of imagination makes us infinite."
    ];

    // State
    let currentLang = 'kr';
    let practiceMode = 'all'; 
    let customQuotes = JSON.parse(localStorage.getItem('typing_custom_quotes') || '[]');
    let currentQuoteText = "";
    let startTime = null;
    let errors = 0;
    let isModalOpen = false;

    // Elements
    const display = document.getElementById('quote-display');
    const input = document.getElementById('input-field');
    const wpmEl = document.getElementById('wpm');
    const accEl = document.getElementById('acc');
    const customListEl = document.getElementById('custom-list');

    // Global Functions
    window.setLanguage = (lang) => {
        currentLang = lang;
        document.getElementById('btn-kr').classList.toggle('active', lang === 'kr');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('unit-label').innerText = lang === 'kr' ? 'CPM' : 'WPM';
        resetQuote();
    };

    window.setTheme = (color, el) => {
        document.documentElement.style.setProperty('--accent', color);
        document.querySelectorAll('.theme-dot').forEach(dot => dot.classList.remove('active'));
        el.classList.add('active');
        showMessage(`Theme Updated`);
    };

    window.setPracticeMode = (mode) => {
        practiceMode = mode;
        document.getElementById('mode-all').classList.toggle('active', mode === 'all');
        document.getElementById('mode-custom').classList.toggle('active', mode === 'custom');
        resetQuote();
    };

    window.toggleModal = (show) => {
        isModalOpen = show;
        document.getElementById('modal').style.display = show ? 'flex' : 'none';
        if (!show) {
            input.focus();
        } else {
            renderCustomList();
        }
    };

    window.resetQuote = () => {
        wpmEl.innerText = '0';
        accEl.innerText = '0';
        renderQuote();
    };

    function renderQuote() {
        display.style.opacity = 0;
        
        setTimeout(() => {
            const filteredCustom = customQuotes.filter(q => q.lang === currentLang).map(q => q.text);
            let pool = [];

            if (practiceMode === 'custom') {
                pool = filteredCustom;
                if (pool.length === 0) {
                    display.innerHTML = `<span style="color:var(--accent); font-size:1.2rem;">문장이 없습니다.</span>`;
                    display.style.opacity = 1;
                    return;
                }
            } else {
                pool = [...(currentLang === 'kr' ? DEFAULT_QUOTES_KR : DEFAULT_QUOTES_EN), ...filteredCustom];
            }
            
            let nextQuote = pool[Math.floor(Math.random() * pool.length)];
            if (pool.length > 1) {
                while(nextQuote === currentQuoteText) {
                    nextQuote = pool[Math.floor(Math.random() * pool.length)];
                }
            }
            
            currentQuoteText = nextQuote;
            display.innerHTML = '';
            currentQuoteText.split('').forEach(char => {
                const span = document.createElement('span');
                span.innerText = char;
                span.className = 'char';
                display.appendChild(span);
            });

            display.style.opacity = 1;
            input.value = '';
            input.maxLength = currentQuoteText.length;
            startTime = null;
            errors = 0;
            updateCursor(0);
        }, 300);
    }

    function updateCursor(index) {
        const spans = display.querySelectorAll('.char');
        spans.forEach(s => s.classList.remove('current'));
        if (spans[index]) spans[index].classList.add('current');
    }

    input.addEventListener('input', () => {
        if (isModalOpen || !currentQuoteText) return;
        const spans = display.querySelectorAll('.char');
        const chars = input.value.split('');
        if (!startTime && input.value.length > 0) startTime = new Date();

        errors = 0;
        spans.forEach((span, i) => {
            const c = chars[i];
            if (c == null) span.className = 'char';
            else if (c === span.innerText) {
                span.className = 'char correct';
            } else { 
                if (!span.classList.contains('incorrect')) {
                    span.className = 'char incorrect';
                }
                errors++; 
            }
        });

        updateCursor(input.value.length);

        if (input.value.length > 0 && startTime) {
            const sec = (new Date() - startTime) / 1000;
            const val = currentLang === 'en' 
                ? Math.round((input.value.length / 5) / (sec / 60)) 
                : Math.round((input.value.length * 60) / sec);
            const accuracy = Math.round(((input.value.length - errors) / input.value.length) * 100);
            wpmEl.innerText = isFinite(val) ? val : 0;
            accEl.innerText = accuracy < 0 ? 0 : accuracy;
        }

        if (input.value.length === currentQuoteText.length) {
            setTimeout(renderQuote, 600);
        }
    });

    document.getElementById('custom-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            const text = e.target.value.trim();
            if (!text) return;
            const newQuote = { id: Date.now().toString(), text: text, lang: currentLang };
            customQuotes.push(newQuote);
            localStorage.setItem('typing_custom_quotes', JSON.stringify(customQuotes));
            e.target.value = '';
            renderCustomList();
            showMessage('Added');
        }
    });

    window.deleteQuote = (id) => {
        customQuotes = customQuotes.filter(q => q.id !== id);
        localStorage.setItem('typing_custom_quotes', JSON.stringify(customQuotes));
        renderCustomList();
    };

    function renderCustomList() {
        const filtered = customQuotes.filter(q => q.lang === currentLang);
        if (filtered.length === 0) {
            customListEl.innerHTML = '<div style="color:#222; font-size:0.7rem; text-align:center; padding: 20px 0;">Empty.</div>';
            return;
        }
        customListEl.innerHTML = filtered.map(q => `
            <div class="custom-item">
                <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 80%;">${q.text}</span>
                <span class="delete-btn" onclick="deleteQuote('${q.id}')">Delete</span>
            </div>
        `).join('');
    }

    function showMessage(msg) {
        const b = document.getElementById('msg-box');
        b.innerText = msg;
        b.style.opacity = 1;
        setTimeout(() => b.style.opacity = 0, 1500);
    }

    window.onload = () => {
        renderQuote();
        input.focus();
    };
</script>

</body>
</html>
